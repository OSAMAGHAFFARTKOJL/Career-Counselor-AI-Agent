<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Realistic young student portrait</title>
  <desc id="desc">A realistic-style digital portrait of a confident young professional student under warm studio lighting.</desc>
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(650 360) rotate(90) scale(760)">
      <stop stop-color="#FFF1DA"/>
      <stop offset="0.5" stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#E8F0FA"/>
    </radialGradient>
    <radialGradient id="keyLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(450 330) rotate(52) scale(510 390)">
      <stop stop-color="#FFE6BE" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#FFE6BE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skinBase" x1="479" y1="263" x2="743" y2="761" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5C8A0"/>
      <stop offset="0.45" stop-color="#D89567"/>
      <stop offset="1" stop-color="#A95E43"/>
    </linearGradient>
    <radialGradient id="faceLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(530 422) rotate(78) scale(302 218)">
      <stop stop-color="#FFD6B7" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFD6B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheekWarmth" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(715 580) rotate(84) scale(172 126)">
      <stop stop-color="#B95649" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#B95649" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neck" x1="520" y1="690" x2="684" y2="887" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C77754"/>
      <stop offset="1" stop-color="#8F4A39"/>
    </linearGradient>
    <linearGradient id="hair" x1="405" y1="196" x2="808" y2="537" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A2420"/>
      <stop offset="0.52" stop-color="#181012"/>
      <stop offset="1" stop-color="#070708"/>
    </linearGradient>
    <linearGradient id="jacket" x1="290" y1="786" x2="908" y2="1116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1F4D"/>
      <stop offset="0.54" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="shirt" x1="534" y1="805" x2="665" y2="1105" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CFE0FF"/>
    </linearGradient>
    <filter id="portraitShadow" x="244" y="172" width="724" height="928" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="40" stdDeviation="34" flood-color="#0F172A" flood-opacity="0.2"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="skinTexture" x="330" y="210" width="550" height="610" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="faceClip">
      <path d="M423 478C423 340 494 246 609 246C725 246 794 340 794 478C794 618 724 745 609 745C494 745 423 618 423 478Z"/>
    </clipPath>
  </defs>

